<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LAS VEGAS - デザイン案4: ベントグリッド</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(180deg, #fafaf9 0%, #f5f5f4 50%, #f0f0f0 100%);
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 16px;
    }

    .start-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    .start-container {
      width: 100%;
      max-width: 440px;
    }

    /* ========== Header Section ========== */
    .start-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .start-logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #1a7d56;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .app-title {
      font-size: clamp(48px, 14vw, 64px);
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -1px;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .app-subtitle {
      font-size: 16px;
      color: #6b7280;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 32px;
    }

    /* ========== Bento Grid ========== */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .bento-item {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(26, 125, 86, 0.08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transition: all 300ms ease-out;
      animation: bentoFadeIn 0.5s ease-out both;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 120px;
    }

    .bento-item:nth-child(1) { animation-delay: 0.1s; }
    .bento-item:nth-child(2) { animation-delay: 0.15s; }
    .bento-item:nth-child(3) { animation-delay: 0.2s; }
    .bento-item:nth-child(4) { animation-delay: 0.25s; }
    .bento-item:nth-child(5) {
      grid-column: 1 / 3;
      animation-delay: 0.3s;
      min-height: 100px;
    }

    @keyframes bentoFadeIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .bento-item:hover {
      border-color: rgba(26, 125, 86, 0.2);
      box-shadow: 0 8px 24px rgba(26, 125, 86, 0.12);
      transform: translateY(-4px);
    }

    .bento-item:active {
      transform: translateY(-2px);
    }

    .bento-label {
      font-size: 12px;
      font-weight: 700;
      color: #1a7d56;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .bento-icon {
      font-size: 32px;
      margin-top: 4px;
    }

    .bento-description {
      font-size: 11px;
      color: #6b7280;
      margin-top: 8px;
      line-height: 1.4;
    }

    /* Special styles for large center item */
    .bento-item:nth-child(5) {
      background: linear-gradient(135deg, #1a7d56, #2fa871);
      border-color: transparent;
      color: #ffffff;
    }

    .bento-item:nth-child(5) .bento-label {
      color: rgba(255, 255, 255, 0.8);
    }

    .bento-item:nth-child(5) .bento-icon {
      font-size: 36px;
    }

    .bento-item:nth-child(5) .bento-description {
      color: rgba(255, 255, 255, 0.7);
    }

    .bento-item:nth-child(5):hover {
      border-color: transparent;
      box-shadow: 0 12px 40px rgba(26, 125, 86, 0.25);
    }

    /* ========== Stats Section ========== */
    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 32px;
      padding: 20px;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid rgba(26, 125, 86, 0.08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      animation: statsSlideUp 0.6s ease-out;
    }

    @keyframes statsSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 800;
      color: #1a7d56;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ========== Buttons ========== */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms ease-out;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1a7d56, #2fa871);
      color: #ffffff;
      box-shadow: 0 8px 20px rgba(26, 125, 86, 0.25);
    }

    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 4px 12px rgba(26, 125, 86, 0.2);
    }

    .btn-secondary {
      background: #ffffff;
      color: #1a7d56;
      border: 2px solid #1a7d56;
    }

    .btn-secondary:active {
      background: #f5f5f4;
      transform: translateY(2px);
    }

    .btn-outline {
      background: transparent;
      color: #1a7d56;
      border: 2px solid #1a7d56;
    }

    .btn-outline:active {
      background: rgba(26, 125, 86, 0.05);
      transform: translateY(2px);
    }
  </style>
</head>
<body>
  <div class="start-screen">
    <div class="start-container">
      <div class="start-header">
        <div class="start-logo">Golf Scoring Platform</div>
        <h1 class="app-title">LAS VEGAS</h1>
        <p class="app-subtitle">ゴルフスコアゲーム</p>
      </div>

      <div class="bento-grid">
        <div class="bento-item">
          <div class="bento-label">18ホール</div>
          <div class="bento-icon">🏌️</div>
          <div class="bento-description">フルラウンド対応</div>
        </div>
        <div class="bento-item">
          <div class="bento-label">4プレイヤー</div>
          <div class="bento-icon">👥</div>
          <div class="bento-description">マルチ対応</div>
        </div>
        <div class="bento-item">
          <div class="bento-label">スコア計算</div>
          <div class="bento-icon">🎯</div>
          <div class="bento-description">自動集計</div>
        </div>
        <div class="bento-item">
          <div class="bento-label">データ保存</div>
          <div class="bento-icon">💾</div>
          <div class="bento-description">ローカル保存</div>
        </div>
        <div class="bento-item">
          <div class="bento-label">今すぐ開始</div>
          <div class="bento-icon">⚡</div>
          <div class="bento-description">インストール不要で即プレー可能</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-number">18</div>
          <div class="stat-label">ホール</div>
        </div>
        <div class="stat">
          <div class="stat-number">4</div>
          <div class="stat-label">プレイヤー</div>
        </div>
        <div class="stat">
          <div class="stat-number">∞</div>
          <div class="stat-label">ゲーム</div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary">新しいゲームを開始</button>
        <button class="btn btn-secondary" style="display: none;">前回のゲームを再開</button>
        <button class="btn btn-outline">ルールブック</button>
      </div>
    </div>
  </div>
</body>
</html>
