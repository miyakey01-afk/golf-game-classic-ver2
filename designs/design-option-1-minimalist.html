<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LAS VEGAS - デザイン案1: ミニマリスト</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(180deg, #fafaf9 0%, #f5f5f4 100%);
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .start-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 16px;
    }

    .start-container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* ========== Header Section ========== */
    .start-header {
      margin-bottom: 64px;
    }

    .start-logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #0f5a3e;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.7;
    }

    .app-title {
      font-size: clamp(48px, 14vw, 64px);
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -2px;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .title-accent {
      background: linear-gradient(135deg, #1a7d56, #2fa871);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-subtitle {
      font-size: 16px;
      color: #6b7280;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 32px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #1a7d56, transparent);
      margin: 0 auto 48px;
      opacity: 0.5;
    }

    /* ========== Feature List ========== */
    .features {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 48px;
    }

    .feature {
      text-align: center;
      animation: fadeInUp 0.6s ease-out both;
    }

    .feature:nth-child(2) { animation-delay: 0.1s; }
    .feature:nth-child(3) { animation-delay: 0.2s; }

    .feature-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .feature-label {
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== Buttons ========== */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms ease-out;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1a7d56, #2fa871);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(26, 125, 86, 0.3);
    }

    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 2px 6px rgba(26, 125, 86, 0.2);
    }

    .btn-secondary {
      background: #ffffff;
      color: #1a7d56;
      border: 2px solid #1a7d56;
    }

    .btn-secondary:active {
      background: #f5f5f4;
      transform: translateY(2px);
    }

    .btn-outline {
      background: transparent;
      color: #1a7d56;
      border: 2px solid #1a7d56;
    }

    .btn-outline:active {
      background: rgba(26, 125, 86, 0.05);
      transform: translateY(2px);
    }

    /* ========== Footer ========== */
    .start-footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid rgba(26, 125, 86, 0.1);
      font-size: 12px;
      color: #9e9e9e;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="start-screen">
    <div class="start-container">
      <div class="start-header">
        <div class="start-logo">Golf Score App</div>
        <h1 class="app-title">
          LAS <span class="title-accent">VEGAS</span>
        </h1>
        <p class="app-subtitle">ゴルフスコアゲーム</p>
        <div class="divider"></div>
      </div>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">🏌️</div>
          <div class="feature-label">4プレイヤー対応</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🎯</div>
          <div class="feature-label">スコアトラッキング</div>
        </div>
        <div class="feature">
          <div class="feature-icon">📊</div>
          <div class="feature-label">リアルタイム集計</div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary">新しいゲームを開始</button>
        <button class="btn btn-secondary" style="display: none;">前回のゲームを再開</button>
        <button class="btn btn-outline">ルールブック</button>
      </div>

      <div class="start-footer">
        v1.0.0 • サポート • 設定
      </div>
    </div>
  </div>
</body>
</html>
