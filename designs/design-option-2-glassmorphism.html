<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LAS VEGAS - デザイン案2: ガラスモーフィズム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0f5a3e 0%, #1a7d56 50%, #2fa871 100%);
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      overflow: hidden;
    }

    /* Animated background elements */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
      animation: float 15s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .start-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 16px;
      position: relative;
      z-index: 1;
    }

    .start-container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* ========== Header Section ========== */
    .start-header {
      margin-bottom: 48px;
    }

    .app-title {
      font-size: clamp(52px, 16vw, 72px);
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -2px;
      margin-bottom: 8px;
      line-height: 1;
      text-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      animation: slideDownFade 0.8s ease-out;
    }

    @keyframes slideDownFade {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .app-subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 32px;
      animation: slideUpFade 0.8s ease-out 0.1s both;
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== Glass Cards ========== */
    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      animation: cardFadeIn 0.6s ease-out both;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .glass-card:nth-child(2) { animation-delay: 0.2s; }
    .glass-card:nth-child(3) { animation-delay: 0.4s; }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-content {
      color: rgba(255, 255, 255, 0.95);
    }

    .card-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .card-description {
      font-size: 12px;
      opacity: 0.8;
      line-height: 1.5;
    }

    /* ========== Buttons ========== */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms ease-out;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.5px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.9));
      color: #1a7d56;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
    }

    .btn-primary:active {
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 4px 16px rgba(255, 255, 255, 0.08);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      border: 1.5px solid rgba(255, 255, 255, 0.4);
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(2px);
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.95);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
    }

    .btn-outline:active {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(2px);
    }
  </style>
</head>
<body>
  <div class="start-screen">
    <div class="start-container">
      <div class="start-header">
        <h1 class="app-title">LAS VEGAS</h1>
        <p class="app-subtitle">ゴルフスコアゲーム</p>
      </div>

      <div class="glass-card">
        <div class="card-content">
          <div class="card-icon">🏌️</div>
          <div class="card-title">スマートスコアリング</div>
          <div class="card-description">リアルタイムでスコアを集計＆分析</div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-content">
          <div class="card-icon">🎯</div>
          <div class="card-title">チームバトル</div>
          <div class="card-description">最大4名でプレーできるゲームモード</div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-content">
          <div class="card-icon">📱</div>
          <div class="card-title">完全オフライン対応</div>
          <div class="card-description">インターネット接続不要で利用可能</div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary">新しいゲームを開始</button>
        <button class="btn btn-secondary" style="display: none;">前回のゲームを再開</button>
        <button class="btn btn-outline">ルールブック</button>
      </div>
    </div>
  </div>
</body>
</html>
